<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Readiness Diagnostic | FCG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #071828;      /* Primary Accessible Text */
            --blue-700: #1D4ED8;  /* Action Color */
            --blue-light: #60A5FA;/* Branding Accent */
            --bg-light: #F8FAFC;  /* Grey-50 background */
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--navy); margin: 0; padding: 40px 20px; }
        .container { max-width: 680px; margin: 0 auto; background: white; padding: 48px; border-radius: 10px; border: 1px solid #CBD5E1; box-shadow: 0 10px 25px rgba(7, 24, 40, 0.05); }
        .header { border-bottom: 2px solid var(--blue-light); margin-bottom: 32px; padding-bottom: 20px; }
        .eyebrow { font-size: 11px; font-weight: 700; color: var(--blue-700); text-transform: uppercase; letter-spacing: 0.1em; }
        h1 { font-size: 28px; font-weight: 800; color: var(--navy); margin-top: 10px; }
        .question-text { font-size: 18px; font-weight: 600; margin: 24px 0; color: var(--navy); } /* Changed to Navy for accessibility */
        .options { display: flex; flex-direction: column; gap: 12px; }
        .btn-opt { background: white; border: 1.5px solid #CBD5E1; padding: 16px; border-radius: 6px; cursor: pointer; text-align: left; font-size: 15px; color: var(--navy); }
        .btn-opt:hover { border-color: var(--blue-700); background: #EFF6FF; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="eyebrow">Domain 1: Data Governance</div>
            <h1>AI Readiness <span style="color:var(--blue-700)">Lite</span></h1>
        </div>
        <p class="question-text">DG-01: Does your organization maintain a documented data inventory that maps data sources used by AI systems?</p>
        <div class="options">
            <button class="btn-opt">5 — Yes / Fully</button>
            <button class="btn-opt">3 — Partially / In Progress</button>
            <button class="btn-opt">1 — No / Not at all</button>
        </div>
    </div>
</body>
</html>
